<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — The Veggie King</title>
  <link rel="stylesheet" href="./index.css?v=1.1" />
</head>
<body>

  <!-- Dynamic Header Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header Banner -->
  <div class="page-header-banner">
    <h1>Our Veggie Menu</h1>
    <p>Fresh, healthy, and delicious meals prepared with love.</p>
  </div>

  <!-- Main Menu Layout -->
  <div class="container section-padding" style="padding-top: 40px;">
    <!-- Filters and Search Bar -->
    <div class="filters-container">
      
      <!-- Search & Sort Row -->
      <div class="filter-row">
        <div class="search-box-wrap">
          <input type="text" id="searchInput" placeholder="Search for foods (e.g. Mighty Burger)..." class="search-input" />
        </div>
        <div class="filter-actions-group">
          <label style="font-weight: 700; font-size: 0.9rem; color: var(--text-muted);">Sort By:</label>
          <select id="sortSelect" class="sort-select">
            <option value="popularity">Popularity</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="rating">Rating</option>
          </select>
          <button id="vegToggleBtn" class="toggle-btn">
            <span class="indicator" id="vegToggleIndicator"></span> Veg Only
          </button>
        </div>
      </div>

      <!-- Categories Filter List -->
      <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
        <span style="font-weight: 700; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase;">Categories:</span>
        <div id="categoriesContainer" style="display: flex; flex-wrap: wrap; gap: 10px;">
          <!-- Category buttons dynamically rendered -->
        </div>
      </div>

    </div>

    <!-- Active Filter Status and Result Count -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="font-size: 1.25rem; font-weight: 700;" id="resultsCount">🍽️ Loading menu...</h3>
    </div>

    <!-- Products Grid -->
    <div id="menuProductsGrid" class="products-grid">
      <!-- Product Cards loaded dynamically -->
    </div>

    <!-- Pagination -->
    <div class="pagination" id="menuPagination">
      <!-- Pagination links dynamically loaded -->
    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Quick View Modal -->
  <div class="modal-overlay" id="quickViewModal">
    <div class="modal-container" style="max-width: 500px; padding: 25px;">
      <button class="modal-close" onclick="closeQuickView()">&times;</button>
      <div id="quickViewContent">
        <!-- Rendered via JS -->
      </div>
    </div>
  </div>

  <!-- Core Scripts -->
  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/mockApi.js"></script>
  <script src="./assets/js/global.js"></script>

  <script>
    let currentCategory = "all";
    let isVegOnly = false;
    let searchQuery = "";
    let sortOption = "popularity";
    
    // Pagination state
    let currentPage = 1;
    const itemsPerPage = 6;

    document.addEventListener("DOMContentLoaded", () => {
      // Parse category filter from URL if present
      const params = new URLSearchParams(window.location.search);
      const catParam = params.get("cat");
      if (catParam) {
        currentCategory = catParam;
      }

      setupCategories();
      setupEventListeners();
      renderMenu();
    });

    function setupCategories() {
      const container = document.getElementById("categoriesContainer");
      if (!container) return;

      let html = `<button class="btn-outline cat-filter-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')" style="padding: 6px 16px; font-size: 0.9rem;">All</button>`;
      
      VK_DATA.categories.forEach(cat => {
        const isActive = currentCategory === cat.id ? 'active' : '';
        html += `<button class="btn-outline cat-filter-btn ${isActive}" onclick="filterCategory('${cat.id}')" style="padding: 6px 16px; font-size: 0.9rem;">${cat.name} ${cat.emoji}</button>`;
      });

      container.innerHTML = html;
    }

    function setupEventListeners() {
      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchQuery = e.target.value.trim().toLowerCase();
        currentPage = 1;
        renderMenu();
      });

      document.getElementById("sortSelect").addEventListener("change", (e) => {
        sortOption = e.target.value;
        renderMenu();
      });

      document.getElementById("vegToggleBtn").addEventListener("click", () => {
        isVegOnly = !isVegOnly;
        const indicator = document.getElementById("vegToggleIndicator");
        if (isVegOnly) {
          indicator.style.backgroundColor = "var(--primary)";
          indicator.style.borderColor = "var(--primary)";
        } else {
          indicator.style.backgroundColor = "transparent";
          indicator.style.borderColor = "var(--border-color)";
        }
        currentPage = 1;
        renderMenu();
      });
    }

    function filterCategory(catId) {
      currentCategory = catId;
      
      // Update UI active buttons
      const btns = document.querySelectorAll(".cat-filter-btn");
      btns.forEach(btn => btn.classList.remove("active"));
      
      event.target.classList.add("active");
      
      currentPage = 1;
      renderMenu();
    }

    function renderMenu() {
      const grid = document.getElementById("menuProductsGrid");
      if (!grid) return;

      // 1. Filter products
      let filtered = VK_DATA.products.filter(p => {
        const matchesCategory = (currentCategory === "all" || p.categoryId === currentCategory);
        const matchesVeg = (!isVegOnly || p.isVeg);
        const matchesSearch = (p.name.toLowerCase().includes(searchQuery) || p.description.toLowerCase().includes(searchQuery));
        return matchesCategory && matchesVeg && matchesSearch;
      });

      // 2. Sort products
      if (sortOption === "price-low") {
        filtered.sort((a, b) => a.price - b.price);
      } else if (sortOption === "price-high") {
        filtered.sort((a, b) => b.price - a.price);
      } else if (sortOption === "rating") {
        filtered.sort((a, b) => b.rating - a.rating);
      } else {
        // default: popularity (isPopular first)
        filtered.sort((a, b) => (b.isPopular ? 1 : 0) - (a.isPopular ? 1 : 0));
      }

      // 3. Update result count
      document.getElementById("resultsCount").textContent = `🍽️ Found ${filtered.length} Items`;

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <span class="empty-icon">🔍</span>
            <h3>No Items Found</h3>
            <p>We couldn't find any meals matching your current search or filters.</p>
            <button class="btn-primary" onclick="resetFilters()">Reset Filters</button>
          </div>
        `;
        document.getElementById("menuPagination").innerHTML = "";
        return;
      }

      // 4. Paginate
      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      const startIndex = (currentPage - 1) * itemsPerPage;
      const paginatedItems = filtered.slice(startIndex, startIndex + itemsPerPage);

      // Render cards
      const wishlist = VK_API.getWishlist();
      const cart = VK_API.getCart();

      grid.innerHTML = paginatedItems.map(prod => {
        const isFav = wishlist.includes(prod.id) ? "active" : "";
        const cartQty = cart[prod.id] || 0;

        return `
          <div class="product-card">
            ${prod.isPopular ? '<span class="card-badge">Popular</span>' : ''}
            <button class="wishlist-toggle ${isFav}" onclick="handleMenuWishlist(${prod.id}, this)">❤️</button>
            <div class="card-img-wrap" onclick="window.location.href='./product.html?id=${prod.id}'" style="cursor:pointer">
              <img src="${prod.imageUrl}" alt="${prod.name}" onerror="this.src='./assets/images/menu-section-mighty-burger.png'" />
            </div>
            <div class="card-content">
              <div class="card-meta">
                <span class="card-category">${prod.category}</span>
                <span class="card-rating">⭐ ${prod.rating}</span>
              </div>
              <h3 class="card-title" onclick="window.location.href='./product.html?id=${prod.id}'" style="cursor:pointer">${prod.name}</h3>
              <p class="card-desc">${prod.description}</p>
              <div style="display:flex; gap: 8px; margin-bottom: 15px;">
                <button class="btn-outline" onclick="openQuickView(${prod.id})" style="padding: 6px 12px; font-size: 0.8rem; width:100%">Quick View 👁️</button>
              </div>
              <div class="card-footer">
                <span class="card-price">₹${prod.price}</span>
                ${cartQty > 0
                  ? `<div class="qty-control">
                       <button class="qty-btn" onclick="updateItemQty(${prod.id}, ${cartQty - 1})">−</button>
                       <span class="qty-val">${cartQty}</span>
                       <button class="qty-btn" onclick="updateItemQty(${prod.id}, ${cartQty + 1})">+</button>
                     </div>`
                  : `<button class="btn-primary" onclick="handleMenuAddToCart(${prod.id})">+ Add</button>`
                }
              </div>
            </div>
          </div>
        `;
      }).join("");

      // Render pagination UI
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const container = document.getElementById("menuPagination");
      if (!container || totalPages <= 1) {
        container.innerHTML = "";
        return;
      }

      let html = `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">&lt;</button>`;
      
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="pagination-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }

      html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">&gt;</button>`;
      
      container.innerHTML = html;
    }

    function changePage(page) {
      currentPage = page;
      renderMenu();
      window.scrollTo({ top: 250, behavior: 'smooth' });
    }

    function resetFilters() {
      document.getElementById("searchInput").value = "";
      searchQuery = "";
      currentCategory = "all";
      isVegOnly = false;
      sortOption = "popularity";
      document.getElementById("sortSelect").value = "popularity";
      
      const indicator = document.getElementById("vegToggleIndicator");
      indicator.style.backgroundColor = "transparent";
      indicator.style.borderColor = "var(--border-color)";

      setupCategories();
      renderMenu();
    }

    function handleMenuWishlist(id, btn) {
      if (!VK_API.getCurrentUser()) {
        showToast("🔑 Please log in first to manage your wishlist!", "error");
        setTimeout(() => { window.location.href = "./auth.html"; }, 1500);
        return;
      }
      VK_API.toggleWishlist(id);
      btn.classList.toggle("active");
      showToast("💖 Wishlist updated!");
      updateNavState();
    }

    function handleMenuAddToCart(id) {
      if (!VK_API.getCurrentUser()) {
        showToast("🔑 Please log in first to add items to cart!", "error");
        setTimeout(() => { window.location.href = "./auth.html"; }, 1500);
        return;
      }
      VK_API.addToCart(id, 1);
      showToast("🛒 Added to cart!");
      renderMenu();
      updateNavState();
    }

    function updateItemQty(id, newQty) {
      VK_API.updateCartQty(id, newQty);
      if (newQty <= 0) {
        showToast("🗑️ Item removed from cart");
      } else {
        showToast("🛒 Cart updated");
      }
      renderMenu();
      updateNavState();
    }

    // Modal logic
    function openQuickView(id) {
      const prod = VK_DATA.products.find(p => p.id === id);
      if (!prod) return;

      const wishlist = VK_API.getWishlist();
      const isFav = wishlist.includes(prod.id) ? "active" : "";

      const content = document.getElementById("quickViewContent");
      content.innerHTML = `
        <div style="text-align: center;">
          <img src="${prod.imageUrl}" alt="${prod.name}" style="width: 100%; max-height: 220px; object-fit: cover; border-radius: var(--radius-card); margin-bottom: 20px;" onerror="this.src='./assets/images/menu-section-mighty-burger.png'"/>
          <h2 style="font-size: 1.6rem; font-weight: 800; color: var(--text-main); margin-bottom: 5px;">${prod.name}</h2>
          <span style="color: var(--primary); font-weight: 700; font-size: 0.9rem; text-transform: uppercase;">${prod.category}</span>
          <div style="margin: 10px 0; color: #ffb800; font-weight: 700;">⭐ ${prod.rating} / 5.0 Rating</div>
          <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; line-height: 1.6;">${prod.description}</p>
          
          <div style="background: var(--gray-light); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left;">
            <h4 style="font-weight: 700; margin-bottom: 8px;">Key Ingredients:</h4>
            <p style="font-size: 0.9rem; color: var(--text-muted);">${prod.ingredients.join(", ")}</p>
          </div>

          <div style="display:flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <span style="font-size: 1.6rem; font-weight: 800; color: var(--text-main);">₹${prod.price}</span>
            <button class="btn-primary" onclick="handleMenuAddToCart(${prod.id}); closeQuickView();" style="padding: 12px 30px;">Add to Cart 🛒</button>
          </div>
        </div>
      `;

      document.getElementById("quickViewModal").classList.add("open");
    }

    function closeQuickView() {
      document.getElementById("quickViewModal").classList.remove("open");
    }
  </script>
</body>
</html>

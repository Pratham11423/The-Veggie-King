<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — The Veggie King</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>

  <!-- Dynamic Header Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header Banner -->
  <div class="page-header-banner">
    <h1>My Profile</h1>
    <p>Manage your account settings, addresses, and details.</p>
  </div>

  <!-- Profile Layout -->
  <div class="container section-padding" style="padding-top: 40px;">
    <div class="sidebar-layout">
      
      <!-- Profile Navigation Sidebar -->
      <div class="sidebar-box">
        <div style="text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 15px;">
          <div class="sidebar-avatar">👤</div>
          <h3 id="sidebarUserTitle">User</h3>
          <p id="sidebarUserEmail">user@example.com</p>
        </div>
        
        <a href="./profile.html" class="sidebar-link active">My Profile Settings</a>
        <a href="./orders.html" class="sidebar-link">My Orders</a>
        <a href="./wishlist.html" class="sidebar-link">Wishlist</a>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 10px 0;" />
        <a href="#" onclick="handleLogout()" class="sidebar-logout">Log Out</a>
      </div>

      <!-- Settings Form -->
      <div class="content-box">
        <h2 class="content-box-title">Personal Details</h2>
        
        <form id="profileForm" onsubmit="handleProfileUpdate(event)">
          <div class="form-group-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="profName" required class="form-control" />
            </div>
            <div class="form-group">
              <label>Email Address (Cannot change)</label>
              <input type="email" id="profEmail" disabled class="form-control" />
            </div>
          </div>
          <div class="form-group-row">
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="profPhone" required class="form-control" />
            </div>
            <div class="form-group">
              <label>Country / Region</label>
              <input type="text" value="India" disabled class="form-control" />
            </div>
          </div>
          <div class="form-group">
            <label>Default Delivery Address</label>
            <textarea id="profAddress" rows="4" placeholder="Enter street address, building, apartment details..." class="form-control"></textarea>
          </div>
          
          <button type="submit" class="btn-primary" style="width: fit-content; align-self: flex-start;">Save Profile Updates</button>
        </form>
      </div>

    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Core Scripts -->
  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/mockApi.js"></script>
  <script src="./assets/js/global.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = VK_API.getCurrentUser();
      if (!user) {
        showToast("🔑 Please log in to access your profile settings", "error");
        setTimeout(() => { window.location.href = "./auth.html"; }, 1500);
        return;
      }
      
      // Populate fields
      document.getElementById("sidebarUserTitle").textContent = user.name;
      document.getElementById("sidebarUserEmail").textContent = user.email;

      document.getElementById("profName").value = user.name;
      document.getElementById("profEmail").value = user.email;
      document.getElementById("profPhone").value = user.phone || "";
      document.getElementById("profAddress").value = user.address || "";
    });

    function handleProfileUpdate(e) {
      e.preventDefault();
      const updatedData = {
        name: document.getElementById("profName").value,
        phone: document.getElementById("profPhone").value,
        address: document.getElementById("profAddress").value
      };
      
      const success = VK_API.updateProfile(updatedData);
      if (success) {
        showToast("✅ Profile updated successfully!");
        setTimeout(() => { window.location.reload(); }, 1500);
      } else {
        showToast("❌ Failed to update profile. Please try again.", "error");
      }
    }

    function handleLogout() {
      if (confirm("Are you sure you want to log out?")) {
        VK_API.logout();
        showToast("🔑 Logged out successfully!");
        setTimeout(() => { window.location.href = "./index.html"; }, 1500);
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — The Veggie King</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>

  <!-- Dynamic Header Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header Banner -->
  <div class="page-header-banner">
    <h1>My Profile</h1>
    <p>Manage your account settings, addresses, and details.</p>
  </div>

  <!-- Profile Layout -->
  <div class="container section-padding" style="padding-top: 40px;">
    <div style="display: grid; grid-template-columns: 250px 1fr; gap: 30px; align-items: start;">
      
      <!-- Profile Navigation Sidebar -->
      <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <div style="text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 15px;">
          <div style="font-size: 3.5rem; margin-bottom: 10px;">👤</div>
          <h3 style="font-weight: 800; color: var(--text-main);" id="sidebarUserTitle">User</h3>
          <p style="font-size: 0.85rem; color: var(--text-muted);" id="sidebarUserEmail">user@example.com</p>
        </div>
        
        <a href="./profile.html" style="background-color: var(--primary-light); color: var(--primary); font-weight: 700; padding: 12px 15px; border-radius: 8px;">My Profile Settings</a>
        <a href="./orders.html" style="font-weight: 600; padding: 12px 15px; border-radius: 8px; color: var(--text-muted);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">My Orders</a>
        <a href="./wishlist.html" style="font-weight: 600; padding: 12px 15px; border-radius: 8px; color: var(--text-muted);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">Wishlist</a>
        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 10px 0;" />
        <a href="#" onclick="handleLogout()" style="font-weight: 700; padding: 12px 15px; border-radius: 8px; color: var(--secondary);">Log Out</a>
      </div>

      <!-- Settings Form -->
      <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 30px;">
        <h2 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">Personal Details</h2>
        
        <form id="profileForm" onsubmit="handleProfileUpdate(event)" style="display: flex; flex-direction: column; gap: 20px;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Full Name</label>
              <input type="text" id="profName" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
            </div>
            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Email Address (Cannot change)</label>
              <input type="email" id="profEmail" disabled style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; background-color: var(--gray-light); color: var(--text-muted);" />
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Phone Number</label>
              <input type="tel" id="profPhone" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
            </div>
            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Country / Region</label>
              <input type="text" value="India" disabled style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; background-color: var(--gray-light); color: var(--text-muted);" />
            </div>
          </div>
          <div>
            <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Default Delivery Address</label>
            <textarea id="profAddress" rows="4" placeholder="Enter street address, building, apartment details..." style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; font-family: inherit; resize: none;"></textarea>
          </div>
          
          <button type="submit" class="btn-primary" style="padding: 12px 25px; font-weight: 700; width: fit-content; align-self: flex-start;">Save Profile Updates</button>
        </form>
      </div>

    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Core Scripts -->
  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/mockApi.js"></script>
  <script src="./assets/js/global.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = VK_API.getCurrentUser();
      if (!user) {
        showToast("🔑 Please log in to access your profile settings", "error");
        setTimeout(() => { window.location.href = "./auth.html"; }, 1500);
        return;
      }
      
      // Populate fields
      document.getElementById("sidebarUserTitle").textContent = user.name;
      document.getElementById("sidebarUserEmail").textContent = user.email;

      document.getElementById("profName").value = user.name;
      document.getElementById("profEmail").value = user.email;
      document.getElementById("profPhone").value = user.phone || "";
      document.getElementById("profAddress").value = user.address || "";
    });

    async function handleProfileUpdate(e) {
      e.preventDefault();
      const name = document.getElementById("profName").value.trim();
      const phone = document.getElementById("profPhone").value.trim();
      const address = document.getElementById("profAddress").value.trim();

      showLoader();
      const res = await VK_API.updateProfile(name, phone, address);
      hideLoader();

      if (res.success) {
        showToast("💾 Profile details updated successfully!");
        document.getElementById("sidebarUserTitle").textContent = res.user.name;
        updateNavState();
      } else {
        showToast("❌ " + res.message, "error");
      }
    }

    function handleLogout() {
      if (confirm("Are you sure you want to logout?")) {
        VK_API.logout();
        window.location.href = "./index.html";
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — The Veggie King</title>
  <link rel="stylesheet" href="./index.css?v=1.1" />
</head>
<body>

  <!-- Dynamic Header Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header Banner -->
  <div class="page-header-banner">
    <h1>Checkout</h1>
    <p>Complete your delivery address and choose payment method.</p>
  </div>

  <!-- Checkout Content -->
  <div class="container section-padding" style="padding-top: 40px;">
    <div style="display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 30px; align-items: start;">
      
      <!-- Checkout Forms -->
      <div style="display: flex; flex-direction: column; gap: 20px;">
        
        <!-- Delivery Address -->
        <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 30px;">
          <h3 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">1. Shipping & Delivery Address</h3>
          <div style="display: flex; flex-direction: column; gap: 15px;">
            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Contact Phone Number</label>
              <input type="tel" id="chkPhone" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
            </div>
            <div>
              <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Street Address</label>
              <textarea id="chkAddress" rows="3" required placeholder="Flat/House no, Street name, Land mark..." style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; font-family: inherit; resize: none;"></textarea>
            </div>
          </div>
        </div>

        <!-- Payment Methods -->
        <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 30px;">
          <h3 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">2. Payment Method</h3>
          <div style="display: flex; flex-direction: column; gap: 15px;">
            <label style="display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; cursor: pointer;" onclick="selectPayment('cod')">
              <input type="radio" name="paymentType" id="payCOD" checked style="width: 18px; height: 18px;" />
              <div>
                <div style="font-weight: 700; color: var(--text-main);">Cash On Delivery (COD)</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">Pay with cash or UPI upon delivery.</div>
              </div>
            </label>
            <label style="display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; cursor: pointer;" onclick="selectPayment('card')">
              <input type="radio" name="paymentType" id="payCard" style="width: 18px; height: 18px;" />
              <div>
                <div style="font-weight: 700; color: var(--text-main);">Mock Credit / Debit Card</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">Simulated instant online transaction payment.</div>
              </div>
            </label>
          </div>
          
          <!-- Mock Card details -->
          <div id="cardDetailsBlock" style="display: none; flex-direction: column; gap: 12px; margin-top: 15px; background: var(--gray-light); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div style="font-weight: 700; font-size: 0.9rem; color: var(--text-main);">Enter Dummy Card Info</div>
            <input type="text" placeholder="1111 2222 3333 4444" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);" />
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
              <input type="text" placeholder="MM/YY" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);" />
              <input type="password" placeholder="CVV" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);" />
            </div>
          </div>
        </div>

      </div>

      <!-- Order Summary Card -->
      <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 25px;">
        <h3 style="font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Order Summary</h3>
        
        <div id="checkoutItemsList" style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; max-height: 200px; overflow-y: auto;">
          <!-- Loaded dynamically -->
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem; border-top: 1px solid var(--border-color); padding-top: 15px; margin-bottom: 20px;">
          <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--text-muted);">Items Subtotal:</span>
            <span style="font-weight: 700;" id="chkSubtotal">₹0</span>
          </div>
          <div style="display: flex; justify-content: space-between; color: var(--primary);" id="chkDiscountRow">
            <span>Coupon Discount:</span>
            <span style="font-weight: 700;" id="chkDiscount">-₹0</span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--text-muted);">Delivery Fee:</span>
            <span style="font-weight: 700;" id="chkDelivery">₹0</span>
          </div>
          <div style="display: flex; justify-content: space-between;">
            <span style="color: var(--text-muted);">Tax (GST 5%):</span>
            <span style="font-weight: 700;" id="chkTax">₹0</span>
          </div>
          <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 5px 0;" />
          <div style="display: flex; justify-content: space-between; font-size: 1.2rem;">
            <span style="font-weight: 800; color: var(--text-main);">Grand Total:</span>
            <span style="font-weight: 900; color: var(--primary);" id="chkTotal">₹0</span>
          </div>
        </div>

        <button class="btn-secondary" onclick="submitOrder()" style="width:100%; padding: 14px; font-weight:700; font-size: 1.1rem; border-radius: var(--radius-btn);">Place Order 🚀</button>
      </div>

    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Core Scripts -->
  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/mockApi.js"></script>
  <script src="./assets/js/global.js"></script>

  <script>
    let activePayment = "cod";
    let couponCode = "";

    document.addEventListener("DOMContentLoaded", () => {
      const user = VK_API.getCurrentUser();
      if (!user) {
        window.location.href = "./auth.html";
        return;
      }

      // Pre-fill profile info
      document.getElementById("chkPhone").value = user.phone || "";
      document.getElementById("chkAddress").value = user.address || "";

      couponCode = localStorage.getItem("vk_active_coupon") || "";

      renderCheckoutSummary();
    });

    function selectPayment(type) {
      activePayment = type;
      const block = document.getElementById("cardDetailsBlock");
      
      if (type === "card") {
        document.getElementById("payCard").checked = true;
        block.style.display = "flex";
      } else {
        document.getElementById("payCOD").checked = true;
        block.style.display = "none";
      }
    }

    function renderCheckoutSummary() {
      const cart = VK_API.getCart();
      const productIds = Object.keys(cart);
      const container = document.getElementById("checkoutItemsList");

      if (productIds.length === 0) {
        showToast("⚠️ Your cart is empty!", "error");
        setTimeout(() => { window.location.href = "./menu.html"; }, 1500);
        return;
      }

      let subtotal = 0;
      let itemsHtml = "";

      productIds.forEach(id => {
        const prod = VK_DATA.products.find(p => p.id === parseInt(id));
        if (prod) {
          const qty = cart[id];
          const totalVal = prod.price * qty;
          subtotal += totalVal;

          itemsHtml += `
            <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.9rem;">
              <span style="color:var(--text-main); font-weight:600;">${prod.name} (x${qty})</span>
              <span style="font-weight:700;">₹${totalVal}</span>
            </div>
          `;
        }
      });

      container.innerHTML = itemsHtml;

      // Calculate totals
      let discountVal = 0;
      if (couponCode === "VEGGIE10") {
        discountVal = Math.round(subtotal * 0.1);
      } else if (couponCode === "FREE50") {
        discountVal = Math.min(50, subtotal);
      }

      const delivery = subtotal > 300 ? 0 : 30;
      const tax = Math.round(subtotal * 0.05);
      const grandTotal = subtotal - discountVal + delivery + tax;

      document.getElementById("chkSubtotal").textContent = `₹${subtotal}`;
      document.getElementById("chkDiscount").textContent = `-₹${discountVal}`;
      document.getElementById("chkDelivery").textContent = delivery === 0 ? "FREE" : `₹${delivery}`;
      document.getElementById("chkTax").textContent = `₹${tax}`;
      document.getElementById("chkTotal").textContent = `₹${grandTotal}`;
    }

    async function submitOrder() {
      const address = document.getElementById("chkAddress").value.trim();
      const phone = document.getElementById("chkPhone").value.trim();

      if (!address || !phone) {
        showToast("⚠️ Please enter shipping address and phone number", "error");
        return;
      }

      showLoader();
      const res = await VK_API.placeOrder(address, activePayment, couponCode);
      hideLoader();

      if (res.success) {
        // Clear coupon
        localStorage.removeItem("vk_active_coupon");
        showToast("🎉 Order placed successfully! Thank you.");
        setTimeout(() => {
          window.location.href = "./orders.html";
        }, 1500);
      } else {
        showToast("❌ " + res.message, "error");
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Register — The Veggie King</title>
  <link rel="stylesheet" href="./index.css?v=1.1" />
</head>
<body>

  <!-- Dynamic Header Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header Banner -->
  <div class="page-header-banner">
    <h1>Welcome to The Veggie King</h1>
    <p>Join us to order delicious and healthy vegetarian food.</p>
  </div>

  <!-- Auth Layout -->
  <div class="container section-padding" style="padding-top: 40px; display: flex; justify-content: center;">
    <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 35px; width: 100%; max-width: 480px; box-shadow: var(--shadow-md);">
      
      <!-- Tabs header -->
      <div style="display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 25px;">
        <button id="tabLogin" onclick="switchTab('login')" style="flex: 1; padding: 12px; background: transparent; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; color: var(--primary); border-bottom: 3px solid var(--primary);">Login</button>
        <button id="tabRegister" onclick="switchTab('register')" style="flex: 1; padding: 12px; background: transparent; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; color: var(--text-muted); border-bottom: 3px solid transparent;">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLoginSubmit(event)" style="display: flex; flex-direction: column; gap: 18px;">
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Email Address</label>
          <input type="email" id="loginEmail" placeholder="Enter your email" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
        </div>
        <div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <label style="font-weight: 600; font-size: 0.9rem;">Password</label>
            <a href="#" onclick="showForgotPassword()" style="font-size: 0.85rem; color: var(--primary); font-weight: 600;">Forgot Password?</a>
          </div>
          <div style="position: relative;">
            <input type="password" id="loginPassword" placeholder="Enter password" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; padding-right: 45px;" />
            <button type="button" onclick="togglePass('loginPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem;">👁️</button>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="checkbox" id="loginRemember" style="width: 16px; height: 16px; cursor: pointer;" />
          <label for="loginRemember" style="font-size: 0.9rem; color: var(--text-muted); cursor: pointer;">Remember me</label>
        </div>
        <button type="submit" class="btn-primary" style="padding: 14px; font-size: 1.05rem; font-weight: 700; margin-top: 10px;">Login Account</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegisterSubmit(event)" style="display: none; flex-direction: column; gap: 18px;">
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Full Name</label>
          <input type="text" id="regName" placeholder="Enter full name" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
        </div>
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Email Address</label>
          <input type="email" id="regEmail" placeholder="Enter your email" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
        </div>
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Phone Number</label>
          <input type="tel" id="regPhone" placeholder="Enter mobile number" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem;" />
        </div>
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Password</label>
          <div style="position: relative;">
            <input type="password" id="regPassword" placeholder="Minimum 6 characters" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; padding-right: 45px;" />
            <button type="button" onclick="togglePass('regPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem;">👁️</button>
          </div>
        </div>
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem;">Confirm Password</label>
          <div style="position: relative;">
            <input type="password" id="regConfirmPassword" placeholder="Confirm password" required style="width: 100%; padding: 12px; border-radius: var(--radius-input); border: 1px solid var(--border-color); font-size: 0.95rem; padding-right: 45px;" />
            <button type="button" onclick="togglePass('regConfirmPassword')" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem;">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn-secondary" style="padding: 14px; font-size: 1.05rem; font-weight: 700; margin-top: 10px;">Create Account</button>
      </form>

    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Core Scripts -->
  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/mockApi.js"></script>
  <script src="./assets/js/global.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Redirect if already logged in
      if (VK_API.getCurrentUser()) {
        window.location.href = "./index.html";
      }
    });

    function switchTab(tab) {
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");

      if (tab === "login") {
        loginForm.style.display = "flex";
        registerForm.style.display = "none";
        tabLogin.style.color = "var(--primary)";
        tabLogin.style.borderBottom = "3px solid var(--primary)";
        tabRegister.style.color = "var(--text-muted)";
        tabRegister.style.borderBottom = "3px solid transparent";
      } else {
        loginForm.style.display = "none";
        registerForm.style.display = "flex";
        tabRegister.style.color = "var(--primary)";
        tabRegister.style.borderBottom = "3px solid var(--primary)";
        tabLogin.style.color = "var(--text-muted)";
        tabLogin.style.borderBottom = "3px solid transparent";
      }
    }

    function togglePass(id) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
      } else {
        input.type = "password";
      }
    }

    async function handleLoginSubmit(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPassword").value;

      showLoader();
      const res = await VK_API.login(email, pass);
      hideLoader();

      if (res.success) {
        showToast("🔑 Welcome back, " + res.user.name + "!");
        setTimeout(() => { window.location.href = "./index.html"; }, 1200);
      } else {
        showToast("❌ " + res.message, "error");
      }
    }

    async function handleRegisterSubmit(e) {
      e.preventDefault();
      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const phone = document.getElementById("regPhone").value.trim();
      const pass = document.getElementById("regPassword").value;
      const confirmPass = document.getElementById("regConfirmPassword").value;

      // Validation
      if (pass.length < 6) {
        showToast("⚠️ Password must be at least 6 characters long", "error");
        return;
      }
      if (pass !== confirmPass) {
        showToast("⚠️ Passwords do not match", "error");
        return;
      }

      showLoader();
      const res = await VK_API.register(name, email, phone, pass);
      hideLoader();

      if (res.success) {
        showToast("🎉 Account created successfully!");
        setTimeout(() => { window.location.href = "./index.html"; }, 1200);
      } else {
        showToast("❌ " + res.message, "error");
      }
    }

    function showForgotPassword() {
      showToast("ℹ️ Password recovery flow is a dummy demo. Try logging in or registering a new account!");
    }
  </script>
</body>
</html>

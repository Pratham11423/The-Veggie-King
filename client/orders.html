<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — The Veggie King</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>

  <!-- Dynamic Header Placeholder -->
  <div id="navbar-placeholder"></div>

  <!-- Page Header Banner -->
  <div class="page-header-banner">
    <h1>My Orders</h1>
    <p>Track delivery status and view order history details.</p>
  </div>

  <!-- Orders Layout -->
  <div class="container section-padding" style="padding-top: 40px;">
    <div style="display: grid; grid-template-columns: 250px 1fr; gap: 30px; align-items: start;">
      
      <!-- Profile Navigation Sidebar -->
      <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 20px; display: flex; flex-direction: column; gap: 10px;">
        <div style="text-align: center; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 15px;">
          <div style="font-size: 3.5rem; margin-bottom: 10px;">👤</div>
          <h3 style="font-weight: 800; color: var(--text-main);" id="sidebarUserTitle">User</h3>
        </div>
        
        <a href="./profile.html" style="font-weight: 600; padding: 12px 15px; border-radius: 8px; color: var(--text-muted);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">My Profile Settings</a>
        <a href="./orders.html" style="background-color: var(--primary-light); color: var(--primary); font-weight: 700; padding: 12px 15px; border-radius: 8px;">My Orders</a>
        <a href="./wishlist.html" style="font-weight: 600; padding: 12px 15px; border-radius: 8px; color: var(--text-muted);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">Wishlist</a>
      </div>

      <!-- Orders Content -->
      <div style="display: flex; flex-direction: column; gap: 20px;">
        <div style="background: white; border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 30px;">
          <h2 style="font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">Order History</h2>
          
          <div id="ordersList" style="display: flex; flex-direction: column; gap: 25px;">
            <!-- Loaded dynamically -->
          </div>

          <div id="emptyOrdersState" style="display: none; text-align: center; padding: 40px 10px;">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">📦</div>
            <h3 style="font-weight: 700; margin-bottom: 8px;">No Orders Placed Yet</h3>
            <p style="color: var(--text-muted); margin-bottom: 20px;">You haven't ordered any delicious veggie food items yet.</p>
            <a href="./menu.html" class="btn-primary" style="display: inline-block;">Explore Menu Now</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Dynamic Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Core Scripts -->
  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/mockApi.js"></script>
  <script src="./assets/js/global.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = VK_API.getCurrentUser();
      if (!user) {
        showToast("🔑 Please log in to view your orders", "error");
        setTimeout(() => { window.location.href = "./auth.html"; }, 1500);
        return;
      }
      
      document.getElementById("sidebarUserTitle").textContent = user.name;
      renderOrders();
    });

    function renderOrders() {
      const orders = VK_API.getOrders();
      const list = document.getElementById("ordersList");
      const emptyState = document.getElementById("emptyOrdersState");

      if (orders.length === 0) {
        list.style.display = "none";
        emptyState.style.display = "block";
        return;
      }

      list.style.display = "flex";
      emptyState.style.display = "none";

      list.innerHTML = orders.map(order => {
        const itemsHtml = order.items.map(item => `
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-color); padding: 10px 0;">
            <div style="display: flex; gap: 10px; align-items: center;">
              <img src="${item.imageUrl}" style="width: 45px; height: 45px; object-fit: cover; border-radius: 8px;" onerror="this.src='./assets/images/menu-section-mighty-burger.png'"/>
              <div>
                <div style="font-weight: 700; font-size: 0.95rem;">${item.name}</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);">Qty: ${item.quantity} x ₹${item.price}</div>
              </div>
            </div>
            <span style="font-weight: 700; font-size: 0.95rem;">₹${item.price * item.quantity}</span>
          </div>
        `).join("");

        return `
          <div style="border: 1px solid var(--border-color); border-radius: var(--radius-card); padding: 20px; background-color: var(--gray-light);">
            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
              <div>
                <span style="font-weight: 800; font-size: 1.05rem; color: var(--primary);">${order.orderId}</span>
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 3px;">Date: ${order.date}</div>
              </div>
              <div style="text-align: right;">
                <span style="background-color: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;">${order.status}</span>
              </div>
            </div>
            
            <!-- Items list -->
            <div style="display: flex; flex-direction: column; gap: 5px;">
              ${itemsHtml}
            </div>

            <!-- Total breakdown -->
            <div style="margin-top: 15px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; font-size: 0.9rem;">
              <div>Subtotal: <span style="font-weight: 700;">₹${order.subtotal}</span></div>
              ${order.discount > 0 ? `<div style="color: var(--primary);">Discount: <span style="font-weight: 700;">-₹${order.discount}</span></div>` : ''}
              <div>Tax (GST): <span style="font-weight: 700;">₹${order.tax}</span></div>
              <div>Delivery: <span style="font-weight: 700;">${order.deliveryCharge === 0 ? "FREE" : "₹" + order.deliveryCharge}</span></div>
              <div style="font-size: 1.15rem; font-weight: 800; color: var(--text-main); border-top: 1px solid var(--border-color); padding-top: 5px; margin-top: 5px;">Total Paid: <span style="color: var(--primary)">₹${order.total}</span></div>
            </div>

            <div style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px; display: flex; justify-content: space-between; align-items: center;">
              <span style="font-size: 0.85rem; color: var(--text-muted);">Payment: <b>${order.paymentMethod.toUpperCase()}</b></span>
              <button class="btn-primary" onclick="reorderItems(${JSON.stringify(order.items).replace(/"/g, '&quot;')})" style="padding: 8px 18px; font-size: 0.9rem;">Reorder Items 🔄</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function reorderItems(items) {
      // Add all items back into cart
      items.forEach(item => {
        VK_API.addToCart(item.productId, item.quantity);
      });
      showToast("🛒 Items added back to your cart!");
      updateNavState();
      setTimeout(() => {
        window.location.href = "./cart.html";
      }, 1000);
    }
  </script>
</body>
</html>
